<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Taller 3-1 Cohen Sutherland</title>

    <style>
        body{
            text-align:center;
            font-family:Arial;
            background:#f4f4f4;
        }

        canvas{
            border:2px solid black;
            background:white;
        }

        button{
            margin:10px;
            padding:10px;
        }

        input{
            width:60px;
        }
    </style>
</head>
<body>

    <h1>Algoritmo Cohen-Sutherland</h1>

    <canvas id="canvas" width="800" height="500"></canvas>

  
Xmin: <input type="number" id="xmin" value="200">
Ymin: <input type="number" id="ymin" value="150">
Xmax: <input type="number" id="xmax" value="600">
Ymax: <input type="number" id="ymax" value="350">

<button onclick="dibujarEscena()">Actualizar</button>

<br><br>

<!-- 4 botones de navegación como pide el enunciado -->
<button onclick="primeraEscena()" title="Primera">|&lt;</button>
<button onclick="anteriorEscena()" title="Anterior">&lt;</button>
<button onclick="siguienteEscena()" title="Siguiente">&gt;</button>
<button onclick="ultimaEscena()" title="Última">&gt;|</button>
<div style="
    display:inline-block;
    margin-top:15px;
    padding:15px 25px;
    background:white;
    border:1px solid #ccc;
    border-radius:8px;
    text-align:left;
    font-family:monospace;
    font-size:14px;
">
    <strong>Escena:</strong> <span id="info-escena">—</span><br><br>
    <strong>Línea original:</strong><br>
    <span id="info-original">—</span><br><br>
    <strong>Recorte:</strong><br>
    <span id="info-recorte">—</span><br><br>
    <strong>Estado:</strong> <span id="info-estado">—</span>
</div>
    <script src="script.js"></script>

</body>
</html>
